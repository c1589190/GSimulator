# GSimulator Configuration
# ========================
# 修改后重启生效。

# --- Data Directories ---
# worlds.dir=worlds
# import.dir=import
# agents.dir=agents
# skills.dir=skills
# data.dir=data

# --- LLM Configuration ---
# 仅在 llms.json 不存在时作为 fallback 创建默认 provider。
# 推荐直接在 llms.json 中配置（支持多 provider）。
# llm.base_url=...
# llm.api_key=...
# llm.model=...
# llm.temperature=0.3

# --- Agent Tool Loop ---
# 主 Orchestrator 最大工具调用轮数。达到上限时 Agent 停止并报错。
# 增大此值可让 Agent 有更多轮次完成复杂任务。
# 默认: 64
agent.tool_loop.max_rounds=64

# --- Sub-Agent Config ---
# 子Agent 的最大工具轮数在 agents/ 目录下各自的 JSON 文件中配置。
# 字段: "maxToolRounds" (默认 32)
# 示例: { "maxToolRounds": 16, "temperature": 0.7, "maxTokens": 4096 }
# 增大 maxToolRounds 可防止子Agent "达到最大轮数 (N) 未完成" 错误。

# --- LLM Streaming ---
llm.stream.enabled=true

# --- CLI Stream Preview ---
cli.stream.preview.enabled=true
cli.stream.preview.max_chars=3000
cli.stream.preview.show_reasoning=true
