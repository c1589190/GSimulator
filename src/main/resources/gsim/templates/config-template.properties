# GSimulator Configuration
# ========================
# Copy this file to gsim.properties and fill in your values.
# Do NOT commit gsim.properties to Git.

# --- LLM Configuration ---
# OpenAI-compatible API endpoint. Must NOT end with a trailing slash.
llm.base_url=https://api.example.com/v1

# Your API key. Keep this secret!
llm.api_key=your-api-key-here

# Model name to use for chat completions.
llm.model=deepseek-v4-pro

# Temperature for generation (0.0 - 2.0).
llm.temperature=0.3

# Request timeout in seconds.
llm.timeout_seconds=300


# --- Data Directories ---
# Relative paths are resolved against the config file directory.
data.dir=data
import.dir=import
output.dir=data/outputs
log.dir=data/logs


# --- Web Research ---
# Enable web search and crawling (experimental).
web_research.enabled=false
web_research.timeout_seconds=30
web_research.user_agent=GSimulator/0.1.0


# --- Embedding Configuration ---
# Provider: "external" (OpenAI-compatible API) or "local-small" (stub, not yet implemented).
embedding.provider=external
embedding.base_url=https://example.com/v1
embedding.api_key=your_embedding_api_key
embedding.model=your_embedding_model
embedding.dimensions=1024
embedding.model_dir=data/models/local-small


# --- ChromaDB ---
# Enable vector knowledge base.
chroma.enabled=false
chroma.base_url=http://localhost:8000

# --- LLM Streaming ---
# Enable real streaming API calls (stream=true).
llm.stream.enabled=true

# --- CLI Stream Preview ---
# Show a grey ANSI preview box while LLM streams.
cli.stream.preview.enabled=true
# Max characters shown in the preview box.
cli.stream.preview.max_chars=3000
# Show reasoning/thinking content in the preview box.
cli.stream.preview.show_reasoning=true
