<div>
    <div class="text-sm font-bold terminal-green mb-2">🌳 时间线分支</div>

    <!-- Mermaid diagram container -->
    <div id="timeline-graph" class="mb-3 p-2 bg-gray-900 rounded overflow-x-auto"
         hx-get="/timeline/data" hx-trigger="load" hx-swap="none"
         hx-on::after-request="loadTimeline(event)">
        <div class="text-gray-600 text-xs">加载时间线...</div>
    </div>

    <!-- Node detail panel -->
    <div id="timeline-detail" class="text-xs text-gray-500 mb-3">
        <div class="text-gray-600">点击节点查看详情</div>
    </div>

    <!-- Node list -->
    <div id="timeline-nodes" class="text-xs">
        <div class="text-gray-500 font-bold mb-1">分支节点</div>
        <div id="timeline-node-list" class="space-y-1">
        </div>
    </div>

    <!-- Refresh button -->
    <button class="mt-3 px-3 py-1 bg-gray-700 hover:bg-gray-600 text-gray-300 text-xs rounded"
            hx-get="/timeline" hx-target="closest div" hx-swap="outerHTML">
        ↻ 刷新
    </button>
</div>

<script>
    function loadTimeline(event) {
        var data = JSON.parse(event.detail.xhr.responseText);
        if (!data.mermaid) return;

        // Render Mermaid
        var graphEl = document.getElementById('timeline-graph');
        graphEl.innerHTML = '<div class="mermaid">' + data.mermaid + '</div>';
        mermaid.run({ querySelector: '.mermaid' });

        // Render node list
        var nodeList = document.getElementById('timeline-node-list');
        nodeList.innerHTML = '';
        if (data.nodes) {
            data.nodes.forEach(function(node) {
                var activeClass = node.isActive
                    ? 'border-green-400 text-green-400'
                    : 'border-gray-600 text-gray-400 hover:border-gray-400';
                var html = '<div class="border-l-2 ' + activeClass + ' pl-2 py-1 cursor-pointer"'
                    + ' hx-get="/timeline/node?id=' + node.id + '"'
                    + ' hx-target="#timeline-detail" hx-swap="innerHTML"'
                    + ' data-node-id="' + node.id + '"'
                    + ' onclick="selectTimelineNode(\'' + node.id + '\')">'
                    + '<div class="font-bold">' + node.name + '</div>'
                    + '<div class="text-gray-600">Turn ' + node.turn
                    + ' | ' + node.worldTime + '</div>'
                    + '</div>';
                nodeList.insertAdjacentHTML('beforeend', html);
                htmx.process(nodeList.lastElementChild);
            });
        }
    }

    function selectTimelineNode(nodeId) {
        var list = document.getElementById('timeline-node-list');
        if (!list) return;
        var nodes = list.querySelectorAll('[data-node-id]');
        for (var i = 0; i < nodes.length; i++) {
            nodes[i].classList.remove('timeline-selected');
        }
        if (nodeId) {
            var target = list.querySelector('[data-node-id="' + nodeId + '"]');
            if (target) target.classList.add('timeline-selected');
        }
    }
</script>
