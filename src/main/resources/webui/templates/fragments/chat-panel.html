<div class="flex flex-col h-full">
    <div class="text-sm font-bold terminal-green mb-2">&#x1F4AC; Agent 对话</div>
    <div id="chat-context" class="text-xs text-gray-500 mb-2 px-2 py-1 bg-gray-800 rounded"
         hx-get="/chat/context-bar" hx-trigger="load" hx-swap="innerHTML">
        分支: —
    </div>
    <div id="chat-messages" class="flex-1 overflow-y-auto mb-2 space-y-2 pr-1"
         hx-get="/chat/messages" hx-trigger="load" hx-swap="innerHTML">
        <div class="text-gray-600 text-sm">发送消息开始对话</div>
    </div>
    <form id="chat-form" class="flex gap-2" autocomplete="off">
        <input type="text" name="message" id="chat-input"
               placeholder="输入消息..." autocomplete="off"
               class="flex-1 input-area rounded px-3 py-2 text-sm text-gray-200">
        <button type="submit" id="chat-send-btn"
                class="px-4 py-2 bg-green-700 hover:bg-green-600 text-white text-sm rounded">
            发送
        </button>
    </form>
</div>
