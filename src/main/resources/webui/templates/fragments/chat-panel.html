<div class="flex flex-col h-full">
    <div class="text-sm font-bold terminal-green mb-2">&#x1F4AC; Agent 对话</div>
    <div id="chat-context" class="text-xs text-gray-500 mb-2">分支: —</div>
    <div id="chat-messages" class="flex-1 overflow-y-auto mb-2 space-y-2">
        <div class="text-gray-600 text-sm">发送消息开始对话</div>
    </div>
    <form id="chat-form" class="flex gap-2"
          hx-post="/chat/send" hx-swap="none">
        <input type="text" name="message" placeholder="输入消息..."
               class="flex-1 input-area rounded px-3 py-2 text-sm text-gray-200">
        <button type="submit"
                class="px-4 py-2 bg-green-700 hover:bg-green-600 text-white text-sm rounded">
            发送
        </button>
    </form>
</div>
